# Configuration for `cargo deny`
#
# https://embarkstudios.github.io/cargo-deny/
#
# Run with: cargo deny check

[graph]
# Don't check dev dependencies for licenses (test-only deps)
exclude-dev = true

[licenses]
# Require explicit approval for all licenses
confidence-threshold = 0.8

private = { ignore = true, registries = [] }  # Ignore workspace crates without licenses

# Licenses that are fine for commercial distribution with attribution
# This blocks all licenses like GPL, AGPL, etc.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "0BSD", # Even more permissive than MIT
    "Zlib", # Very permissive
    "BSL-1.0", # Boost Software License
    "Unicode-3.0", # For Unicode data
    "OFL-1.1", # Open Font License (requires attribution)
    "Ubuntu-font-1.0", # Ubuntu font license
]
exceptions = [
    # { allow = ["license_name"], crate = "crate_name" },
]

[advisories]
# Check for security vulnerabilities
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]

# Don't warn about unmaintained crates
unmaintained = "none"

# Yanked crates should be denied
yanked = "deny"

# Ignore specific advisories if needed
# ignore = []

[bans]
# Allow crates to have multiple versions
multiple-versions = "allow"

[sources]
# Only allow crates from these sources
unknown-registry = "warn"
unknown-git = "deny"

# Allow any required repos.
allow-git = [
    "https://github.com/Omustardo/egui_logger.git",
]

[output]
# Make output more readable
feature-depth = 1